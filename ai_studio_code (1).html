<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Type of Changemaker Are You?</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #fdfdfd;
            --card: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Image Styling */
        .quiz-img {
            max-width: 100%;
            height: auto;
            max-height: 220px;
            margin: 0 auto 20px auto;
            display: block;
            border-radius: 8px;
        }

        h1 { color: var(--primary); font-size: 26px; margin-bottom: 10px; }
        p { font-size: 16px; color: #555; }

        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .hidden { display: none; }

        #options-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

        .btn {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
            transition: all 0.2s ease;
            color: var(--text);
        }

        .btn:hover { border-color: var(--accent); background: #f9fffb; transform: translateY(-2px); }
        
        .start-btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            font-weight: bold; 
            text-align: center; 
            font-size: 18px; 
            width: 100%;
            margin-top: 10px;
        }

        /* Results Display */
        .result-header { font-size: 32px; color: var(--accent); margin-top: 10px; }
        .result-section { text-align: left; background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .result-section h3 { margin-top: 0; font-size: 18px; color: var(--primary); border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .result-list { padding-left: 20px; margin-bottom: 0; }
        .result-list li { margin-bottom: 8px; }

    </style>
</head>
<body>

<div class="container">
    <!-- Intro Screen -->
    <div id="intro">
        <img src="header-grid.png" alt="Changemakers" class="quiz-img">
        <h1>What Type of Changemaker Are You?</h1>
        <p>Everybody notices problems and responds to challenges in their own way. Discover your natural approach to making a difference.</p>
        <button class="btn start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-container" class="hidden">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <img id="question-image" class="quiz-img" src="" alt="Question Illustration">
        <h2 id="question-text" style="font-size: 20px;"></h2>
        <div id="options-container"></div>
    </div>

    <!-- Results Screen -->
    <div id="result" class="hidden">
        <img id="result-image" class="quiz-img" style="max-height: 180px;" src="" alt="Result Icon">
        <h1 class="result-header" id="result-type"></h1>
        
        <div class="result-section">
            <p id="result-intro" style="font-weight: 500; font-size: 17px; margin: 0;"></p>
        </div>
        
        <div class="result-section">
            <h3>You probably:</h3>
            <ul id="result-probably" class="result-list"></ul>
        </div>

        <div class="result-section">
            <h3>Ways you create change:</h3>
            <ul id="result-change" class="result-list"></ul>
        </div>

        <div class="result-section" style="background: #e8f5e9; border-left: 5px solid var(--accent);">
            <strong>Inquiry Process Strengths:</strong>
            <p id="result-strengths" style="margin: 5px 0 0 0;"></p>
        </div>

        <button class="btn start-btn" onclick="location.reload()" style="background: #34495e;">Take Quiz Again</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. You never leave for school without:", img: "q1.png", options: [
            { text: "A playlist, podcast, book, or something interesting to think about", type: "Investigator" },
            { text: "A random collection of supplies that might come in handy", type: "Builder" },
            { text: "Your phone fully charged and ready to document everything", type: "Communicator" },
            { text: "Texts from three different group chats already blowing up", type: "Networker" },
            { text: "Snacks, gum, or something to share with friends", type: "Nurturer" },
            { text: "A strong opinion about something annoying happening at school", type: "Resister" }
        ]},
        { q: "2. There’s a huge puddle in the middle of campus. You are most likely to:", img: "q2.png", options: [
            { text: "Wonder why it keeps happening every year", type: "Investigator" },
            { text: "Start figuring out a way to fix or redesign the area", type: "Builder" },
            { text: "Post a funny video or photo about it", type: "Communicator" },
            { text: "Organize people to help solve the problem", type: "Networker" },
            { text: "Warn people so nobody gets soaked", type: "Nurturer" },
            { text: "Complain that the school has not fixed it yet", type: "Resister" }
        ]},
        { q: "3. Which words feel MOST connected to “making change”?", img: "q3.png", options: [
            { text: "Explore", type: "Investigator" },
            { text: "Create", type: "Builder" },
            { text: "Inspire", type: "Communicator" },
            { text: "Collaborate", type: "Networker" },
            { text: "Support", type: "Nurturer" },
            { text: "Challenge", type: "Resister" }
        ]},
        { q: "4. Your advisory is planning a project. Your first instinct is:", img: "q4.png", options: [
            { text: "“We should find out what students actually think first.”", type: "Investigator" },
            { text: "“I already have ideas for what we could make or change.”", type: "Builder" },
            { text: "“We need a good way to spread the message.”", type: "Communicator" },
            { text: "“Who should we bring together to work on this?”", type: "Networker" },
            { text: "“Some students probably feel left out of this conversation.”", type: "Nurturer" },
            { text: "“We should talk honestly about what is not working.”", type: "Resister" }
        ]},
        { q: "5. You are most likely to get frustrated in a group project when:", img: "q5.png", options: [
            { text: "Nobody slows down to really understand the problem", type: "Investigator" },
            { text: "People keep talking and nobody starts building anything", type: "Builder" },
            { text: "The group has good ideas but presents them badly", type: "Communicator" },
            { text: "Communication completely falls apart", type: "Networker" },
            { text: "People get ignored or talked over", type: "Nurturer" },
            { text: "Everyone avoids the real issue", type: "Resister" }
        ]},
        { q: "6. Your friends would probably describe you as:", img: "q6.png", options: [
            { text: "Always asking questions or noticing things others miss", type: "Investigator" },
            { text: "A real problem-solver", type: "Builder" },
            { text: "Someone who knows how to get people excited", type: "Communicator" },
            { text: "A connector who knows everybody", type: "Networker" },
            { text: "Someone people feel comfortable talking to", type: "Nurturer" },
            { text: "Someone who stands up when something feels unfair", type: "Resister" }
        ]},
        { q: "7. It’s a free Sunday afternoon. You are most likely:", img: "q7.png", options: [
            { text: "Watching videos, reading, or exploring something you’re curious about", type: "Investigator" },
            { text: "Making, building, customizing, or creating something", type: "Builder" },
            { text: "Posting, filming, editing, or sharing something online", type: "Communicator" },
            { text: "Hanging out with lots of people or organizing plans", type: "Networker" },
            { text: "Spending quality time with close friends or family", type: "Nurturer" },
            { text: "Debating or researching something you think is wrong in the world", type: "Resister" }
        ]},
        { q: "8. A teacher changes the seating chart. Your brain goes to:", img: "q8.png", options: [
            { text: "“I wonder why they changed it.”", type: "Investigator" },
            { text: "“There’s probably a better setup than this.”", type: "Builder" },
            { text: "“This is definitely going to create drama.”", type: "Communicator" },
            { text: "“Okay wait who’s sitting with who now?”", type: "Networker" },
            { text: "“Some people are going to feel really uncomfortable.”", type: "Nurturer" },
            { text: "“Why do teachers care so much about where we sit?”", type: "Resister" }
        ]},
        { q: "9. During a class discussion, you naturally tend to:", img: "q9.png", options: [
            { text: "Ask follow-up questions", type: "Investigator" },
            { text: "Suggest practical ideas or solutions", type: "Builder" },
            { text: "Help explain ideas clearly", type: "Communicator" },
            { text: "Build off what other people are saying", type: "Networker" },
            { text: "Notice who has not spoken yet", type: "Nurturer" },
            { text: "Push back when something does not feel right", type: "Resister" }
        ]},
        { q: "10. When you imagine making change, you picture yourself:", img: "q10.png", options: [
            { text: "Investigating problems and asking important questions", type: "Investigator" },
            { text: "Designing or creating something useful", type: "Builder" },
            { text: "Using stories, media, or communication to influence people", type: "Communicator" },
            { text: "Bringing people together around a goal", type: "Networker" },
            { text: "Helping people feel supported and included", type: "Nurturer" },
            { text: "Challenging unfair systems or speaking up for others", type: "Resister" }
        ]}
    ];

    const typeDetails = {
        "Investigator": {
            img: "res-investigator.png",
            intro: "You notice things other people miss. Investigators are curious, thoughtful, and always trying to figure out what is really going on beneath the surface.",
            probably: ["Ask lots of questions", "Notice patterns and contradictions", "Like learning new things", "Want the “full story” before jumping to conclusions"],
            change: ["Interviewing students or gathering survey data", "Researching issues that matter to them", "Exposing unfairness or hidden problems"],
            strengths: "We Wonder, We Investigate, We Make Sense"
        },
        "Builder": {
            img: "res-builder.png",
            intro: "Builders are hands-on changemakers. When Builders see a problem, they immediately start imagining ways to improve or redesign something.",
            probably: ["Enjoy making things", "Like practical solutions", "Think best by doing"],
            change: ["Designing apps, products, or systems", "Improving spaces at school", "Building models, prototypes, or solutions"],
            strengths: "We Take Action, We Make Sense"
        },
        "Communicator": {
            img: "res-communicator.png",
            intro: "Communicators know how to make ideas heard. They are storytellers, presenters, and creators who know how to capture attention.",
            probably: ["Enjoy sharing ideas", "Notice how messages affect people", "Enjoy helping ideas feel exciting or meaningful"],
            change: ["Creating awareness campaigns", "Designing posters, videos, or podcasts", "Public speaking or presenting"],
            strengths: "We Communicate, We Take Action"
        },
        "Networker": {
            img: "res-networker.png",
            intro: "Networkers bring people together. They notice connections, build relationships, and help groups collaborate.",
            probably: ["Know lots of people", "Enjoy teamwork", "Connect ideas and people naturally"],
            change: ["Organizing events or meetings", "Connecting groups around a shared goal", "Making sure people feel included"],
            strengths: "We Investigate, We Communicate, We Take Action"
        },
        "Nurturer": {
            img: "res-nurturer.png",
            intro: "Nurturers pay attention to people’s experiences and emotions. They notice when people feel left out or unsupported.",
            probably: ["Care deeply about people", "Notice how others are feeling", "Listen carefully"],
            change: ["Supporting mental health or belonging", "Mentoring or supporting others", "Advocating for kindness and empathy"],
            strengths: "We Reflect, We Wonder"
        },
        "Resister": {
            img: "res-resister.png",
            intro: "Resisters challenge things that feel unfair, harmful, or dishonest. They are willing to speak up and question systems.",
            probably: ["Have strong opinions", "Question rules or systems", "Notice injustice quickly"],
            change: ["Activism and advocacy", "Protesting or raising awareness", "Speaking up for people whose voices are ignored"],
            strengths: "We Wonder, We Communicate, We Take Action"
        }
    };

    let currentQuestion = 0;
    let scores = { Investigator: 0, Builder: 0, Communicator: 0, Networker: 0, Nurturer: 0, Resister: 0 };

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz-container').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const qData = questions[currentQuestion];
        document.getElementById('question-image').src = qData.img;
        document.getElementById('question-text').innerText = qData.q;
        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = '';
        
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.type);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('progress').style.width = ((currentQuestion / questions.length) * 100) + '%';
    }

    function selectOption(type) {
        scores[type]++;
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-container').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        window.scrollTo(0, 0);

        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const data = typeDetails[winner];

        document.getElementById('result-image').src = data.img;
        document.getElementById('result-type').innerText = winner;
        document.getElementById('result-intro').innerText = data.intro;
        document.getElementById('result-strengths').innerText = data.strengths;

        document.getElementById('result-probably').innerHTML = data.probably.map(i => `<li>${i}</li>`).join('');
        document.getElementById('result-change').innerHTML = data.change.map(i => `<li>${i}</li>`).join('');
    }
</script>

</body>
</html>
